<html>
<head>
    <title>Articles</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./resources/mana.css">
    <link rel="stylesheet" href="./resources/header.css">
</head>
<script title="root">
    const rootPath = ".";
</script>
<style>
    @font-face {
        font-family: 'Beleren Small Caps';
        src: url('./resources/beleren-caps.ttf');
    }
    @font-face {
        font-family: Beleren;
        src: url('./resources/beleren.ttf');
    }
    @font-face {
        font-family: 'Gotham Narrow Medium';
        src: url('./resources/gotham-narrow-medium.otf');
    }
    body {
        font-family: 'Open Sans', 'Helvetica', 'Arial', sans-serif;
        overscroll-behavior: none;
        margin: 0px;
        background-color: #f3f3f3;
    }
    .articles-page-container {
        width: 90%;
        max-width: 1200px;
        margin: 40px auto;
    }
    .gallery-section {
        margin-bottom: 50px;
        width: 75%;
        justify-self: center;
    }
    .gallery-category {
        font-family: Beleren;
        font-size: 32px;
        margin-bottom: 20px;
        border-bottom: 2px solid #171717;
        padding-bottom: 10px;
    }
    .gallery-scroll {
        display: flex;
        overflow-x: auto;
        gap: 20px;
        padding-top: 10px;
        padding-bottom: 20px;
        scrollbar-width: thin;
        scrollbar-color: #171717 #e0e0e0;
    }
    .gallery-scroll::-webkit-scrollbar {
        height: 8px;
    }
    .gallery-scroll::-webkit-scrollbar-track {
        background: #e0e0e0;
    }
    .gallery-scroll::-webkit-scrollbar-thumb {
        background-color: #171717;
        border-radius: 4px;
    }
    .article-card {
        flex: 0 0 300px;
        background-color: white;
        border: 1px solid #d5d9d9;
        border-radius: 8px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
    }
    .article-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
    .article-card-img {
        width: 100%;
        height: 180px;
        background-size: cover;
        background-position: center;
        background-color: #ddd;
    }
    .article-card-img.no-img {
        background-image: url('./img/card_back.png');
        background-size: contain;
        background-repeat: no-repeat;
    }
    .article-card-info {
        padding: 15px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .article-card-title {
        font-family: 'Gotham Narrow Medium', sans-serif;
        font-size: 20px;
        line-height: 1.2;
    }
    .article-card-subtitle {
        font-size: 14px;
        color: #666;
        line-height: 1.4;
    }
</style>
<body>
    <div class="header">
		<div class="search-grid">
			<a onclick="window.location.href = rootPath + '/'"><img class="sg-logo" id="header-banner"></a>
			<img class="sg-icon" id="header-search" onclick="goToSearch()">
			<div style="position: relative; width: 100%;">
				<input type="text" inputmode="search" placeholder="Search ..." name="search" id="search" spellcheck="false" autocomplete="off" autocorrect="off" spellcheck="false">
				<div id="tag-dropdown" style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #d5d9d9; z-index: 1000; max-height: 200px; overflow-y: auto; color: black; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"></div>
			</div>
			<a onclick="window.location.href = rootPath + '/all-sets'"><img id="header-sets" class="sg-icon">Sets</a>
			<a onclick="window.location.href = rootPath + '/articles'"><img id="header-articles" class="sg-icon">Articles</a>
			<a onclick="window.location.href = rootPath + '/deckbuilder'"><img id="header-deck" class="sg-icon">Deckbuilder</a>
			<a onclick="randomCard()"><img id="header-random" class="sg-icon">Random</a>
		</div>
	</div>
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			document.getElementById("header-banner").src = rootPath + "/img/banner.png";
			document.getElementById("header-search").src = rootPath + "/img/search.png";
			document.getElementById("header-sets").src = rootPath + "/img/sets.png";
			document.getElementById("header-articles").src = rootPath + "/img/articles.png";
			document.getElementById("header-deck").src = rootPath + "/img/deck.png";
			document.getElementById("header-random").src = rootPath + "/img/random.png";
		});

		function goToSearch() {
			window.location.href = rootPath + "/search";
		}
	</script>
    <div class="articles-page-container">
        
        <div class="gallery-section">
            <h2 class="gallery-category">Sail and Steam</h2>
            <div class="gallery-scroll">
                
            <a href="articles/prologue" class="article-card">
                <div class="article-card-img" style="background-image: url('https://i.imgur.com/9I7RNy2.jpeg');"></div>
                <div class="article-card-info">
                    <div class="article-card-title">PROLOGUE</div>
                    <div class="article-card-subtitle" style="display: none;">PROLOGUE</div>
                </div>
            </a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("search").addEventListener("keypress", function(event) {
          if (event.key === "Enter") {
                event.preventDefault();
                search();
          }
        });

        function search() {
            const url = new URL(rootPath + '/search', window.location.href.split('?')[0].split('/').slice(0, -1).join('/') + '/');
            url.searchParams.append('search', document.getElementById("search").value);
            window.location.href = url.pathname + url.search;
        }

        function randomCard() {
            fetch(rootPath + '/lists/all-cards.json')
                .then(response => response.json())
                .then(data => {
                    const cards = data.cards;
                    const random_card = cards[Math.floor(Math.random() * cards.length)];
                    const url = new URL(rootPath + '/card', window.location.href.split('?')[0].split('/').slice(0, -1).join('/') + '/');
                    const params = {
                        set: random_card.set,
                        num: random_card.number,
                        name: random_card.card_name
                    }
                    for (const key in params) {
                        url.searchParams.append(key, params[key]);
                    }
                    window.location.href = url.pathname + url.search;
                }).catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
